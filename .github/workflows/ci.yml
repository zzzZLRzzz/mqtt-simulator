name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: go mod tidy

    - name: Run tests with race detector, coverage and benchmarks
      run: go test -race -v -coverprofile=coverage.out -covermode=atomic -bench=. -benchmem ./... 2>&1 | tee test-output.txt

    - name: Display coverage summary
      run: go tool cover -func=coverage.out

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.out

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-output
        path: test-output.txt
      if: always()